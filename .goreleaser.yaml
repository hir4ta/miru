version: 2
project_name: miru

before:
  hooks:
    - go mod tidy

builds:
  - id: miru
    main: ./cmd/miru
    binary: miru
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hir4ta/miru/internal/installer.Version={{ .Version }}

archives:
  - id: default
    name_template: "miru_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - sample.md
      - sample.js
      - sample.py
      - sample.go
      - sample.json
      - LICENSE*

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

# Keyless Sigstore signing via the GitHub OIDC token. No long-lived
# secrets — the signing identity is the workflow that produced the
# release (https://github.com/hir4ta/miru/.github/workflows/release.yml).
# Verify locally:
#   cosign verify-blob \
#     --certificate-identity-regexp 'https://github.com/hir4ta/miru/.+' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     checksums.txt
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "--yes"
      - "${artifact}"
    artifacts: checksum
    output: true

release:
  github:
    owner: hir4ta
    name: miru
  draft: false
  prerelease: auto

brews:
  - name: miru
    repository:
      owner: hir4ta
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/hir4ta/miru
    description: A quiet file viewer for your terminal
    license: MIT
    commit_author:
      name: hir4ta
      email: shunichi@hir4ta.com
    install: |
      bin.install "miru"
    test: |
      assert_match "miru", shell_output("#{bin}/miru --version")

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
